services:
  api:
    build:
      context: ../../apps/api
    environment:
      DATABASE_URL: sqlite+pysqlite:///./bot_arena.db
      SECRET_KEY: CHANGE_ME_BOT_ARENA
      ACCESS_TOKEN_EXPIRE_MINUTES: "20"
      REFRESH_TOKEN_EXPIRE_DAYS: "14"
      ALLOWED_ORIGINS: '["http://localhost:3100","http://127.0.0.1:3100"]'
    ports:
      - "8100:8000"

  web:
    build:
      context: ../../apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:8000
    ports:
      - "3100:3000"
