services:
  api:
    build:
      context: ../../apps/api
    environment:
      DATABASE_URL: sqlite+pysqlite:///./dev.db
      SECRET_KEY: CHANGE_ME_DEV_ONLY
      ACCESS_TOKEN_EXPIRE_MINUTES: "20"
      REFRESH_TOKEN_EXPIRE_DAYS: "14"
      ALLOWED_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    ports:
      - "8000:8000"

